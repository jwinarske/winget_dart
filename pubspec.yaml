name: winget_dart
description: >-
  Dart FFI bindings for WinGet (Windows Package Manager). Search, install,
  upgrade, and uninstall packages with async progress on x64 and ARM64.
version: 0.3.0
repository: https://github.com/jwinarske/winget_dart
issue_tracker: https://github.com/jwinarske/winget_dart/issues

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  ffi: ^2.1.0
  path: ^1.9.0
  hooks: ^1.0.0
  code_assets: ^1.0.0
  native_toolchain_c: ^0.17.0

dev_dependencies:
  ffigen: ^18.0.0
  test: ^1.24.0
  lints: ^4.0.0

platforms:
  windows:

topics:
  - windows
  - winget
  - package-manager
  - ffi
  - arm64
